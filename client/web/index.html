<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BTC Runner Game</title>
        <style>
          @font-face {
            font-family: 'pix'; /* Choose a name for your font */
            src: url('../../package/assets/fonts/Graph-35-pix.ttf') format('truetype'); /* Specify the path to your .ttf file */
            font-weight: normal; /* Or specify a weight like bold, 400, 700 */
            font-style: normal; /* Or specify italic */
          }
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100%;
                height: 100%;
                background-color: black;
                font-family: 'pix', sans-serif;
            }
            #wrapper {
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: black;
                position: relative;
            }
            .hidden-text {
              color: transparent; 
              font-family: pix; 
              position: absolute;
              font-size: 1;
            }
            
            #ui-layer {
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              pointer-events: none;
              display: flex;
              flex-direction: column;
              justify-content: space-between;
              padding: 2rem;
              box-sizing: border-box;
              z-index: 10;
              display: none;
            }
            
            .question-box {
              background: rgba(255, 255, 255, 0.9);
              border: 4px solid #4a3b2c;
              border-radius: 12px;
              padding: 1.5rem;
              text-align: center;
              font-size: 2.2rem;
              color: #333;
              box-shadow: 0 4px 8px rgba(0,0,0,0.5);
              margin-top: 1rem;
              font-family: 'pix', sans-serif;
            }

            .feedback-box {
              font-size: 2.5rem;
              text-align: center;
              font-weight: bold;
              text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
              height: 4rem;
              display: flex;
              align-items: center;
              justify-content: center;
              font-family: 'pix', sans-serif;
            }

            .feedback-correct {
              color: #4CAF50;
            }

            .feedback-wrong {
              color: #F44336;
            }
            
            .buttons-container {
              display: flex;
              justify-content: center;
              gap: 2rem;
              pointer-events: auto;
              margin-bottom: 2rem;
            }
            
            .answer-btn {
              background: #f1c40f;
              border: 4px solid #d35400;
              border-radius: 12px;
              padding: 1rem 2rem;
              font-size: 1.8rem;
              font-family: 'pix', sans-serif;
              color: #333;
              cursor: pointer;
              transition: transform 0.1s, background 0.1s;
              box-shadow: 0 4px 0 #d35400;
              min-width: 250px;
            }
            
            .answer-btn:hover {
              background: #f39c12;
              transform: translateY(-2px);
              box-shadow: 0 6px 0 #d35400;
            }
            
            .answer-btn:active {
              transform: translateY(2px);
              box-shadow: 0 2px 0 #d35400;
            }

            #victory-screen {
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background: rgba(0, 0, 0, 0.8);
              display: none;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              z-index: 20;
              color: white;
            }

            .victory-text {
              font-size: 4rem;
              color: #f1c40f;
              text-align: center;
              text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
              margin-bottom: 2rem;
              font-family: 'pix', sans-serif;
            }
        </style>
        <script type="module" src="src/main.ts"></script>
    </head>
    <body>
      <div class="hidden-text">.</div>
      <div id="loading-wrapper"
          style="display: flex; justify-content: center; align-items: center; 
                  height: 100vh; width: 100vw; background: black;">
        <div style="color: white; font-family: 'pix'; font-size: 2rem; text-align: center;">
          Loading...
        </div>
      </div>
        <div id="wrapper">
            <canvas id="game"></canvas>
            
            <div id="ui-layer">
              <div id="question-text" class="question-box">Question goes here?</div>
              
              <div id="feedback-text" class="feedback-box"></div>
              
              <div class="buttons-container">
                <button id="btn-a" class="answer-btn">Option A</button>
                <button id="btn-b" class="answer-btn">Option B</button>
              </div>
            </div>

            <div id="victory-screen">
              <div class="victory-text">Victory!</div>
              <div class="victory-text" style="font-size: 2.5rem;">You made it to the Plains of Moab!</div>
            </div>
        </div>
    </body>
</html>
